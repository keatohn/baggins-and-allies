# GitHub Pages: Settings → Pages → Build and deployment → Source: GitHub Actions
#
# Set repo variable VITE_API_URL (Settings → Secrets and variables → Actions → Variables)
# to your production API URL, e.g. https://your-service.up.railway.app (no trailing slash).
#
# If the site URL is https://<user>.github.io/<repo>/ (project site), set VITE_BASE_PATH
# to /<repo>/ and add base: process.env.VITE_BASE_PATH || '/' in vite.config.ts — see docs/PRODUCTION_DEPLOYMENT.md.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: |
          cd frontend
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
